<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Augustus LaFortune</title>
  <style>
    body {
      margin: 0;
      background: #5f8196;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    a { color: #0b5f8f; font-weight: bold; }

    #page {
      width: 980px;
      margin: 0 auto;
      background: #e8eef0;
      border-left: 2px solid #8fa7b4;
      border-right: 2px solid #8fa7b4;
      min-height: 100vh;
    }

    #header {
      background: #54788d;
      color: white;
      padding: 12px 18px 6px 18px;
      border-bottom: 3px solid #d69b16;
    }

    #site-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
      font-variant: small-caps;
      letter-spacing: 1px;
      text-shadow: 2px 2px #38596c;
    }

    #top-links {
      margin-top: 8px;
      background: #6f7629;
      border-top: 1px solid #b5bc74;
      border-bottom: 1px solid #333;
      padding: 3px 6px;
      font-size: 13px;
    }

    #top-links a {
      color: white;
      text-decoration: none;
      margin-right: 22px;
    }

    #main {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    #left-column {
      display: table-cell;
      width: 270px;
      vertical-align: top;
      background: #d5e1e6;
      padding: 12px;
      border-right: 2px solid #9aaeb8;
    }

    #content {
      display: table-cell;
      vertical-align: top;
      padding: 16px 20px 28px 20px;
      background: white;
    }

    .box {
      background: #fff;
      border: 1px solid #8a9ca5;
      margin-bottom: 12px;
    }

    .box-title {
      background: #a94b1b;
      color: white;
      font-weight: bold;
      padding: 4px 7px;
      font-size: 13px;
    }

    .box-body { padding: 8px; }

    iframe {
      width: 100%;
      height: 600px;
      border: 1px solid #777;
      background: white;
    }

    h1 {
      margin: 0 0 4px 0;
      font-size: 32px;
      color: #111;
    }

    .edited {
      color: #666;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 22px;
      color: #333;
      border-bottom: 1px solid #bbb;
      padding-bottom: 4px;
    }

    h3 {
      font-size: 17px;
      margin-top: 22px;
      color: #000;
    }

    li { margin-bottom: 8px; line-height: 1.35; }

    #footer {
      text-align: center;
      color: white;
      background: #54788d;
      border-top: 3px solid #d69b16;
      padding: 10px;
      font-size: 12px;
    }
	
	.scaled-frame {
		width: 100%;
		height: 250px;
		overflow: hidden;
		border: 1px solid #777;
		background: white;
	}

	.scaled-frame iframe {
		width: 200%;
		height: 500px;
		border: 0;
		transform: scale(0.5);
		transform-origin: 0 0;
	}
	
  </style>
</head>
<body>
  <div id="page">
    <div id="header">
        <div id="site-title">Augustus LaFortune</div>
        <div id="top-links">
            <a href="https://lafortua.github.io/index.html">Home</a>
            <a href="#">Final Project</a>
            <a href="mailto:lafortua@whitman.edu">Contact</a>
        </div>
    </div>

    <div id="main">

        <div id="content">

	    </div>
    </div>

    <div id="footer">
        Hosted on GitHub Pages
    </div>
  </div>
</body>
</html>
