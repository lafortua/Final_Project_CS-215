<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Augustus LaFortune</title>
	<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #5f8196;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    a { color: #0b5f8f; font-weight: bold; }

    #page {
      width: 980px;
      margin: 0 auto;
      background: #e8eef0;
      border-left: 2px solid #8fa7b4;
      border-right: 2px solid #8fa7b4;
      min-height: 100vh;
    }

    #header {
      background: #54788d;
      color: white;
      padding: 12px 18px 6px 18px;
      border-bottom: 3px solid #d69b16;
    }

    #site-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
      font-variant: small-caps;
      letter-spacing: 1px;
      text-shadow: 2px 2px #38596c;
    }

    #top-links {
      margin-top: 8px;
      background: #6f7629;
      border-top: 1px solid #b5bc74;
      border-bottom: 1px solid #333;
      padding: 3px 6px;
      font-size: 13px;
    }

    #top-links a {
      color: white;
      text-decoration: none;
      margin-right: 22px;
    }

    #main {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    #left-column {
      display: table-cell;
      width: 270px;
      vertical-align: top;
      background: #d5e1e6;
      padding: 12px;
      border-right: 2px solid #9aaeb8;
    }

    #content {
      display: table-cell;
      vertical-align: top;
      padding: 16px 20px 28px 20px;
      background: white;
    }

    .box {
      background: #fff;
      border: 1px solid #8a9ca5;
      margin-bottom: 12px;
    }

    .box-title {
      background: #a94b1b;
      color: white;
      font-weight: bold;
      padding: 4px 7px;
      font-size: 13px;
    }

    .box-body { padding: 8px; }

    iframe {
      width: 100%;
      height: 600px;
      border: 1px solid #777;
      background: white;
    }

    h1 {
      margin: 0 0 4px 0;
      font-size: 32px;
      color: #111;
    }

    .edited {
      color: #666;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 22px;
      color: #333;
      border-bottom: 1px solid #bbb;
      padding-bottom: 4px;
    }

    h3 {
      font-size: 17px;
      margin-top: 22px;
      color: #000;
    }

    li { margin-bottom: 8px; line-height: 1.35; }

    #footer {
      text-align: center;
      color: white;
      background: #54788d;
      border-top: 3px solid #d69b16;
      padding: 10px;
      font-size: 12px;
    }
	
	.scaled-frame {
		width: 100%;
		height: 250px;
		overflow: hidden;
		border: 1px solid #777;
		background: white;
	}

	.scaled-frame iframe {
		width: 200%;
		height: 500px;
		border: 0;
		transform: scale(0.5);
		transform-origin: 0 0;
	}
	
  </style>
</head>
<body>
  <div id="page">
    <div id="header">
        <div id="site-title">Augustus LaFortune</div>
        <div id="top-links">
            <a href="https://lafortua.github.io/index.html">Home</a>
            <a href="#">Final Project</a>
            <a href="mailto:lafortua@whitman.edu">Contact</a>
        </div>
    </div>

    <div id="main">

        <div id="content">
			<div class="controls">
        <label for="wordInput"><strong>Target Word:</strong></label>
        <input type="text" id="wordInput" value="miss" placeholder="Type a word...">
        <button onclick="updatePlot()">Update Plot</button>
    </div>

    <div id="plotDiv" style="width: 100%; max-width: 1200px; height: 600px;">
        <p style="color: gray;">Loading data...</p>
    </div>

    <script>
        let allData = []; // Global variable to hold our parsed CSV rows

        // 1. Load and parse the CSV file
        Papa.parse("https://lafortua.github.io/Final_Project_CS-215/Cheers_Character-Keyword_Correlation.csv", {
            download: true,       // Fetches the file via HTTP
            delimiter: ";",       // Set the semicolon delimiter
            header: true,         // Uses the first row as object keys
            dynamicTyping: true,  // Converts numerical strings to actual numbers automatically
            skipEmptyLines: true, // Ignores trailing blank lines in the CSV
            complete: function(results) {
                allData = results.data;
                console.log("CSV Successfully Loaded:", allData);

				// Get an array of just the 'Word' column, filter out any empty rows, and make them unique using Set
                const allWords = allData.map(row => row.Word).filter(word => word);
                const uniqueWords = [...new Set(allWords)];
                
                // Optional: Sort the words alphabetically for the dropdown
                uniqueWords.sort((a, b) => a.toString().localeCompare(b.toString()));

                // Get the select element and populate it with the unique words
                const selectElement = document.getElementById('wordSelect');
                uniqueWords.forEach(word => {
                    const option = document.createElement('option');
                    option.value = word;
                    option.text = word;
                    selectElement.appendChild(option);
                });
				
                // Clear the "Loading data..." text and draw the initial plot
                document.getElementById('plotDiv').innerHTML = ''; 
                updatePlot();
            },
            error: function(err) {
                console.error("Error loading CSV:", err);
                document.getElementById('plotDiv').innerHTML = 
                    '<p style="color: red;">Error loading CSV file. Are you running a local web server?</p>';
            }
        });

        // 2. The update function
        function updatePlot() {
            // Ensure data has actually loaded before trying to plot
            if (allData.length === 0) return;

            const targetWord = document.getElementById('wordInput').value.toLowerCase().trim();

            // Filter the dataset
            // Using .toLowerCase() on both sides ensures we don't fail due to capitalization differences
            let filteredData = allData.filter(row => 
                row.Word && row.Word.toString().toLowerCase() === targetWord
            );

            if (filteredData.length === 0) {
                alert(`No data found for the word "${targetWord}".`);
                return;
            }

            // Sort by Character alphabetically
            filteredData.sort((a, b) => a.Character.localeCompare(b.Character));

            // Extract arrays for Plotly
            const characters = filteredData.map(row => row.Character);
            const correlations = filteredData.map(row => row.Correlation);
            const pValues = filteredData.map(row => row.P_value);

            const trace = {
                x: characters,
                y: correlations,
                type: 'bar',
                marker: {
                    color: correlations,
                    colorscale: 'RdBu',
                    reversescale: true,
                    cmid: 0, 
                    colorbar: { title: 'Correlation' }
                },
                customdata: pValues,
                hovertemplate: 
                    '<b>Character:</b> %{x}<br>' +
                    '<b>Correlation:</b> %{y:.4f}<br>' +
                    '<b>P_value:</b> %{customdata:.4f}' +
                    '<extra></extra>'
            };

            const layout = {
                title: `Correlation between "${targetWord}" and Characters`,
                plot_bgcolor: 'white',
                xaxis: { title: 'Character' },
                yaxis: { title: 'Correlation' },
                shapes: [
                    {
                        type: 'line',
                        x0: 0, x1: 1, xref: 'paper',
                        y0: 0, y1: 0, yref: 'y',
                        line: { color: 'black', width: 1 }
                    }
                ]
            };

            Plotly.newPlot('plotDiv', [trace], layout);
        }

        // Allow pressing "Enter" to trigger the update
        document.getElementById('wordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') updatePlot();
        });
    </script>
			
	    </div>
    </div>

    <div id="footer">
        Hosted on GitHub Pages
    </div>
  </div>
</body>
</html>
